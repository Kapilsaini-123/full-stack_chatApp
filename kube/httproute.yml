apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chatapp-route
  namespace: chat-app
spec:
  parentRefs:
    - name: chatapp-gateway
  hostnames:
    - "chatapp.local"
  rules:

    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 5001

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 80
